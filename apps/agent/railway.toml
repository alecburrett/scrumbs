[build]
dockerfilePath = "apps/agent/Dockerfile"
buildCommand = "npm run build -w @scrumbs/types && npm run build -w @scrumbs/db && npm run build -w @scrumbs/personas && npm run build -w @scrumbs/agent"

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
